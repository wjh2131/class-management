<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 班级管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .register-container {
            background: white;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 550px;
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #667eea; font-size: 28px; margin-bottom: 10px; }
        .header p { color: #999; font-size: 14px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; font-size: 14px; }
        input[type="text"], input[type="password"], input[type="email"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .link { text-align: center; margin-top: 20px; }
        .link a { color: #667eea; text-decoration: none; font-weight: 600; }
        .link a:hover { text-decoration: underline; }
        .alert {
            padding: 12px 16px;
            margin-bottom: 20px;
            border-radius: 8px;
            font-size: 14px;
        }
        .alert-success { background: #d4edda; color: #155724; border-left: 4px solid #28a745; }
        .alert-error { background: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; }
        .required::after { content: " *"; color: #dc3545; }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="header">
            <h1>用户注册</h1>
            <p>填写以下信息完成注册</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label class="required">用户名</label>
                <input type="text" name="username" placeholder="用于登录的用户名" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="required">真实姓名</label>
                    <input type="text" name="real_name" placeholder="您的真实姓名" required>
                </div>
                <div class="form-group">
                    <label class="required">学号</label>
                    <input type="text" name="student_id" placeholder="您的学号" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="required">手机号</label>
                    <input type="text" name="phone" placeholder="联系电话" required>
                </div>
                <div class="form-group">
                    <label class="required">邮箱</label>
                    <input type="email" name="email" placeholder="电子邮箱" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="required">密码</label>
                    <input type="password" name="password" placeholder="设置密码" required>
                </div>
                <div class="form-group">
                    <label class="required">确认密码</label>
                    <input type="password" name="confirm_password" placeholder="再次输入密码" required>
                </div>
            </div>
            <button type="submit">注 册</button>
        </form>
        <div class="link">
            <p>已有账号？<a href="{{ url_for('login') }}">立即登录</a></p>
        </div>
    </div>
</body>
</html>
