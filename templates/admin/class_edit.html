<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑班级</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f5f7fa; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; border-radius: 10px; margin-bottom: 30px; }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; transition: all 0.3s; text-decoration: none; display: inline-block; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5568d3; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-secondary:hover { background: #5a6268; }
        .card { background: white; border-radius: 10px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        .form-group textarea { resize: vertical; }
        .flash-messages { margin-bottom: 20px; }
        .flash-success { background: #d4edda; color: #155724; padding: 10px; border-radius: 5px; margin-bottom: 10px; }
        .flash-error { background: #f8d7da; color: #721c24; padding: 10px; border-radius: 5px; margin-bottom: 10px; }
        .nav { background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .nav a { color: #667eea; text-decoration: none; margin-right: 20px; }
        .nav a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="{{ url_for('admin_classes') }}">← 返回班级列表</a>
        </div>

        <div class="header">
            <h1>编辑班级信息</h1>
            <p>修改班级基本信息</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                        <div class="flash-{{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <div class="card">
            <form method="POST" action="{{ url_for('admin_class_edit', class_id=class_obj.id) }}">
                <div class="form-group">
                    <label>班级名称 *</label>
                    <input type="text" name="name" value="{{ class_obj.name }}" required>
                </div>
                <div class="form-group">
                    <label>年级 *</label>
                    <input type="text" name="grade" value="{{ class_obj.grade }}" required>
                </div>
                <div class="form-group">
                    <label>班主任</label>
                    <select name="teacher_id">
                        <option value="">请选择班主任（可选）</option>
                        {% for teacher in teachers %}
                            <option value="{{ teacher.id }}" {% if class_obj.teacher_id == teacher.id %}selected{% endif %}>
                                {{ teacher.real_name }} ({{ teacher.phone }})
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>班级描述</label>
                    <textarea name="description" rows="4">{{ class_obj.description or '' }}</textarea>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn btn-primary">保存修改</button>
                    <a href="{{ url_for('admin_classes') }}" class="btn btn-secondary">取消</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
